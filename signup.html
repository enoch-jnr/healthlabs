<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthLabs — Intelligent Medical Annotation Platform</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- ==================== SIGNUP ==================== -->
<div id="page-signup" class="page auth-page active">
  <div class="auth-left">
    <a href="index.html" class="auth-brand" style="text-decoration:none">Health<span>Labs</span></a>
    <div class="auth-visual">
      <div class="auth-quote">"Where medical imaging meets modern AI."</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h2>Create your account</h2>
      <p class="auth-sub">Start annotating in minutes</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Dr. Jane Smith" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@hospital.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" />
      </div>
      <div id="signup-error" class="form-error hidden"></div>
      <button class="btn btn-primary btn-full" onclick="handleSignup()">Create Account</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
